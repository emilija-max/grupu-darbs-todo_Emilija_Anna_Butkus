<!DOCTYPE html>
<html lang="lv">
    <head>
        <title>Klases darbs</title>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <div class="container mt-5">
            <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title mb-4">Mani darbi</h3>

                <div class="input-group mb-3">
                <input type="text" id="task-input" class="form-control" placeholder="Ieraksti jaunu darbu...">
                <button class="btn btn-primary" id="add-task">Pievienot</button>
                </div>

                <ul id="task-list" class="list-group"></ul>
            </div>
            </div>
        </div>

        <!-- JavaScript -->
        <script>
            const input = document.getElementById('task-input');
            const addBtn = document.getElementById('add-task');
            const taskList = document.getElementById('task-list');

            addBtn.onclick = function() {
            const taskText = input.value.trim();
            if (taskText !== "") {
                addTask(taskText);
                saveTasks();
                input.value = "";
            }
            };

            function addTask(text) {
            const li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-center";
            li.textContent = text;

            const delBtn = document.createElement('button');
            delBtn.className = "btn btn-danger btn-sm";
            delBtn.textContent = "Dzēst";
            delBtn.onclick = function() {
                li.remove();
                saveTasks();
            };

            li.appendChild(delBtn);
            taskList.appendChild(li);
            }

            function saveTasks() {
            const tasks = [];
            document.querySelectorAll('#task-list li').forEach(li => {
                tasks.push(li.firstChild.textContent);
            });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            }
        </script>
    </body>
</html>
